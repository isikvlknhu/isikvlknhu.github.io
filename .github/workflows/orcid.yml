name: Fetch ORCID Publications

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Repo clone
        uses: actions/checkout@v3

      - name: ORCID publications çek
        run: |
          curl -H "Accept: application/json" \
          https://pub.orcid.org/v3.0/0000-0003-3690-969X/works \
          -o publications.json

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add publications.json
          git commit -m "Update publications" || echo "No changes"
          git push
